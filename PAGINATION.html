<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activity Pagination</title>

<link rel="stylesheet" href="pagination.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- BACKGROUND -->
<div class="background"></div>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- STARS -->
<div class="stars">

    <span style="top:10%; left:20%; animation-delay:0s;"></span>
    <span style="top:18%; left:70%; animation-delay:1s;"></span>
    <span style="top:35%; left:55%; animation-delay:2s;"></span>
    <span style="top:70%; left:80%; animation-delay:1.5s;"></span>
    <span style="top:82%; left:18%; animation-delay:2.5s;"></span>
    <span style="top:48%; left:92%; animation-delay:3s;"></span>

</div>

<!-- MAIN CONTAINER -->
<div class="container">

    <!-- TITLE -->
    <h1 class="title">
        Activity Compilation
    </h1>

    <!-- DESCRIPTION -->
    <p class="description">
        Navigate through the activities below.
    </p>

    <!-- PAGINATION -->
    <div class="pagination">

        <a href="activity2.html" class="page-btn">
            Activity 2
        </a>

        <a href="activity3.html" class="page-btn">
            Activity 3
        </a>

        <a href="activity4.html" class="page-btn">
            Activity 4
        </a>

        <a href="activity5.html" class="page-btn">
            Activity 5
        </a>

        <a href="activity6.html" class="page-btn">
            Activity 6
        </a>

    </div>

    <!-- FOOTER -->
    <div class="footer">
        HTML & CSS Activity Compilation
    </div>

</div>

</body>
</html>
