<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACTIVITY # 3: CSS HOVER, SHADOW AND TRANSITION</title>

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>Famous Website</h1>

    <p>
        Uber, Amazon, GitHub, Bootstrap, and LinkedIn button styles
    </p>

    <!-- TOP ROW -->
    <div class="top-row">

        <div class="box">
            <button class="uber-btn">
                Request now
            </button>
        </div>

        <div class="box">
            <button class="amazon-btn">
                Add to Cart
            </button>
        </div>

        <div class="box">
            <button class="github-btn">
                Sign up
            </button>
        </div>

    </div>

    <!-- MIDDLE ROW -->
    <div class="middle-row box">

        <button class="bootstrap1">
            Get started
        </button>

        <button class="bootstrap2">
            Download
        </button>

    </div>

    <!-- BOTTOM ROW -->
    <div class="bottom-row box">

        <button class="linkedin1">
            Apply on company website
        </button>

        <button class="linkedin2">
            Save
        </button>

    </div>

</div>

</body>
</html>
