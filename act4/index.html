<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>ACTIVITY # 4: HTML IMAGE, FAVICON AND AUDIO</title>

<!-- Favicon -->
<link rel="icon" type="image/jpg" href="https://i.pinimg.com/736x/81/0f/a5/810fa508e0a00d92ff045e2c4e3fa20b.jpg">

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Decorative stars -->
<div class="stars">
    <span style="top:10%; left:20%; animation-delay:0s;"></span>
    <span style="top:30%; left:70%; animation-delay:1s;"></span>
    <span style="top:50%; left:40%; animation-delay:2s;"></span>
    <span style="top:15%; left:80%; animation-delay:3s;"></span>
    <span style="top:75%; left:60%; animation-delay:1.5s;"></span>
    <span style="top:65%; left:15%; animation-delay:2.5s;"></span>
</div>

<section class="container">

    <!-- GIF IMAGE -->
    <figure class="image-frame">
        <img
            src="https://i.pinimg.com/originals/16/5e/a1/165ea1fd36de790d7fd64b5a1fd8e5bb.gif"
            alt="Relaxing Pixel Night"
            class="relax-img"
        >
    </figure>

    <!-- MUSIC PLAYER -->
    <div class="music-box">

        <iframe
            width="100%"
            height="166"
            scrolling="no"
            frameborder="no"
            allow="autoplay"
            src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/softy_soo/sets/sometimes-i-wait-for-you&color=%230b1025&auto_play=false&hide_related=false&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
        </iframe>

    </div>

</section>

</body>
