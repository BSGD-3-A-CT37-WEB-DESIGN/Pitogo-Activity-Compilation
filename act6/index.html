<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACTIVITY # 6: LOGIN PAGE</title>

<link rel="icon" type="image/png" href="https://i.pinimg.com/736x/81/0f/a5/810fa508e0a00d92ff045e2c4e3fa20b.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- GIF BACKGROUND -->
<img
    src="https://i.pinimg.com/originals/af/50/b3/af50b3509ccaa3273ff360ad41acd66d.gif"
    class="bg-gif"
    alt="Background GIF"
>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- STARS -->
<div class="stars">
    <span style="top:10%;left:20%;animation-delay:0s;"></span>
    <span style="top:18%;left:70%;animation-delay:1s;"></span>
    <span style="top:35%;left:55%;animation-delay:2s;"></span>
    <span style="top:70%;left:80%;animation-delay:1.5s;"></span>
    <span style="top:82%;left:18%;animation-delay:2.5s;"></span>
    <span style="top:48%;left:92%;animation-delay:3s;"></span>
</div>

<!-- LOGIN BOX -->
<div class="login-box">

    <div class="logo">
        Lunaris
    </div>

    <p class="subtitle">
        Enter your peaceful digital space and continue your late-night journey.
    </p>

    <!-- EMAIL -->
    <div class="input-group">

        <label class="input-label">
            Email
        </label>

        <input
            type="email"
            class="input-field"
            placeholder="Enter your email"
        >

    </div>

    <!-- PASSWORD -->
    <div class="input-group">

        <label class="input-label">
            Password
        </label>

        <input
            type="password"
            class="input-field"
            placeholder="Enter your password"
        >

    </div>

    <!-- OPTIONS -->
    <div class="options">

        <label>
            <input type="checkbox">
            Remember me
        </label>

        <a href="#">
            Forgot Password?
        </a>

    </div>

    <!-- BUTTON -->
    <button class="login-btn">
        Login
    </button>

    <!-- FOOTER -->
    <div class="footer">
        Don't have an account?
        <a href="#">Create One</a>
    </div>

</div>

</body>
</html>
