<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACTIVITY # 7: PAGINATION</title>

<link rel="icon" type="image/png" href="https://i.pinimg.com/736x/81/0f/a5/810fa508e0a00d92ff045e2c4e3fa20b.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Inter",sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:#050816;

    color:white;
}

/* BACKGROUND */

.bg{
    position:fixed;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:-3;
}

/* OVERLAY */

.overlay{
    position:fixed;
    inset:0;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,0.30),
        rgba(0,0,0,0.68)
    );

    z-index:-2;
}

/* PAGINATION CONTAINER */

.pagination-box{

    display:flex;
    gap:14px;

    flex-wrap:wrap;

    justify-content:center;
    align-items:center;

    padding:24px 30px;

    border-radius:30px;

    background:rgba(10,15,28,0.28);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(16px);

    box-shadow:
    0 20px 60px rgba(0,0,0,0.35);

    animation:fadeUp 1s ease;
}

/* BUTTONS */

.page-btn{

    width:52px;
    height:52px;

    border:none;

    border-radius:18px;

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.08);

    color:white;

    font-size:1rem;

    font-weight:500;

    cursor:pointer;

    transition:0.35s;

    backdrop-filter:blur(10px);
}

.page-btn:hover{

    transform:translateY(-4px);

    background:rgba(255,255,255,0.12);

    box-shadow:
    0 10px 30px rgba(0,0,0,0.25);
}

/* ACTIVE BUTTON */

.page-btn.active{

    background:rgba(180,200,255,0.22);

    border:1px solid rgba(180,200,255,0.25);

    color:white;

    box-shadow:
    0 10px 35px rgba(130,150,255,0.18);
}

/* ARROW BUTTONS */

.arrow{

    width:auto;

    padding:0 22px;
}

/* STARS */

.stars{
    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;
}

.stars span{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:0.7;

    animation:blink 4s infinite ease-in-out;
}

@keyframes blink{

    0%,100%{
        opacity:0.2;
    }

    50%{
        opacity:1;
    }

}

/* ANIMATION */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* MOBILE */

@media(max-width:600px){

    .pagination-box{
        gap:10px;
        padding:18px;
    }

    .page-btn{
        width:46px;
        height:46px;
        border-radius:16px;
    }

}

</style>
</head>
<body>

<!-- BACKGROUND -->
<img
    src="https://i.pinimg.com/originals/e5/40/08/e54008fec896ec085da559cf537d6f32.gif"
    class="bg"
    alt="Background"
>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- STARS -->
<div class="stars">

    <span style="top:10%;left:20%;animation-delay:0s;"></span>
    <span style="top:18%;left:70%;animation-delay:1s;"></span>
    <span style="top:35%;left:55%;animation-delay:2s;"></span>
    <span style="top:70%;left:80%;animation-delay:1.5s;"></span>
    <span style="top:82%;left:18%;animation-delay:2.5s;"></span>
    <span style="top:48%;left:92%;animation-delay:3s;"></span>

</div>

<!-- PAGINATION -->
<div class="pagination-box">

    <button class="page-btn arrow">
        ←
    </button>

    <button class="page-btn active">
        1
    </button>

    <button class="page-btn">
        2
    </button>

    <button class="page-btn">
        3
    </button>

    <button class="page-btn">
        4
    </button>

    <button class="page-btn">
        5
    </button>

    <button class="page-btn arrow">
        →
    </button>

</div>

</body>
</html>
