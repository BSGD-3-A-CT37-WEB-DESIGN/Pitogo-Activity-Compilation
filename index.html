<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lunaris Activities Compilation</title>

<link rel="icon" type="image/png"
href="https://i.pinimg.com/736x/81/0f/a5/810fa508e0a00d92ff045e2c4e3fa20b.jpg">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Inter",sans-serif;
    min-height:100vh;
    background:#050816;
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-3;
}

/* OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    background:linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.78));
    z-index:-2;
}

/* STARS */
.stars{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.stars span{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:blink 4s infinite ease-in-out;
}

@keyframes blink{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* MAIN CONTENT */
.container{
    width:min(1200px,92%);
    margin:auto;
    padding:70px 0;
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:60px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:28px;
}

/* CARD */
.card{
    background:rgba(10,15,28,0.38);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:28px;
    padding:28px;
    backdrop-filter:blur(16px);
}

/* BUTTON */
.open-btn{
    display:inline-block;
    padding:14px 24px;
    border-radius:18px;
    background:rgba(255,255,255,0.10);
    color:white;
    text-decoration:none;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:70px;
    color:rgba(255,255,255,0.55);
}

/* ========================= */
/* LOGIN OVERLAY */
/* ========================= */

.login-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.login-box{
    width:320px;
    background:rgba(10,15,28,0.6);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

.login-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:white;
    font-weight:bold;
}

.error{
    color:#ff6b6b;
    font-size:0.85rem;
    margin-top:10px;
    display:none;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginPage">

    <div class="login-box">
        <h2>Lunaris Login</h2>

        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">

        <button onclick="login()">Enter</button>

        <div class="error" id="error">
            Wrong username or password
        </div>
    </div>

</div>

<!-- MAIN CONTENT -->
<div id="mainContent" class="hidden">

<img src="https://i.pinimg.com/originals/e5/40/08/e54008fec896ec085da559cf537d6f32.gif" class="bg">
<div class="overlay"></div>

<div class="stars">
    <span style="top:10%;left:20%;"></span>
    <span style="top:30%;left:70%;"></span>
    <span style="top:50%;left:40%;"></span>
</div>

<div class="container">

<div class="header">
    <h1>Lunaris Activities Compilation</h1>
    <p>All HTML & CSS Activities</p>
</div>

<div class="grid">

<div class="card">
    <h2>Activity #2</h2>
    <a class="open-btn" href="act2/">Open</a>
</div>

<div class="card">
    <h2>Activity #3</h2>
    <a class="open-btn" href="act3/">Open</a>
</div>

<div class="card">
    <h2>Activity #4</h2>
    <a class="open-btn" href="act4/">Open</a>
</div>

<div class="card">
    <h2>Activity #5</h2>
    <a class="open-btn" href="act5/">Open</a>
</div>

<div class="card">
    <h2>Activity #6</h2>
    <a class="open-btn" href="act6/">Open</a>
</div>

</div>

<div class="footer">
    Developed by Lunaris
</div>

</div>

</div>

<!-- SCRIPT -->
<script>
function login(){
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    if(user === "admin" && pass === "1234"){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainContent").classList.remove("hidden");
    } else {
        document.getElementById("error").style.display = "block";
    }
}
</script>

</body>
</html>
